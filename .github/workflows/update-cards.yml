name: Refresh card index

on:
  schedule:
    - cron: '17 9 * * 1'   # weekly, Monday 09:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Rebuild index from Scryfall bulk data
        run: node scripts/build-index.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No card changes this week."
          else
            git commit -m "data: weekly Scryfall card index refresh"
            git push
          fi
